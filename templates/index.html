<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>AI Asistan & Takvim Yönetimi</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">


    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
    </div>

    <nav class="navbar navbar-expand-lg bg-primary navbar-dark sticky-top py-3 px-lg-5">
        <div class="container-fluid">
            <a href="#" class="navbar-brand fw-bold m-0"><i class="fa fa-calendar-check me-3"></i>Asistan Panel</a>
        </div>
    </nav>
    <div class="container-fluid py-5 px-lg-5">
        <div class="row g-4">
            <div class="col-lg-6 col-md-12">
                <div class="chat-container border rounded bg-white p-4 d-flex flex-column h-100">
                    <h5 class="section-title bg-white text-primary px-3 mb-4">AI Asistan ile Konuş</h5>

                    <div id="chat-box" class="chat-box flex-grow-1 overflow-auto mb-3 pe-2" style="height: 500px;">
                        <div class="message assistant-msg mb-3 p-3 bg-light rounded">
                            <strong>Asistan:</strong> Merhaba! Müşteri eklemek veya randevu planlamak için bana yazabilirsiniz.
                        </div>
                    </div>

                    <div class="input-group">
                        <input type="text" id="user-input" class="form-control bg-transparent border-secondary py-3 ps-4" placeholder="Randevu oluştur veya müşteri kaydet...">
                        <button type="button" id="send-btn" class="btn btn-primary px-4"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 col-md-12">
                <div class="calendar-container border rounded bg-white p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="section-title bg-white text-primary px-3 m-0">Güncel Randevular</h5>
                        <button id="refresh-calendar" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                            <i class="fa fa-sync-alt me-1"></i> Yenile
                        </button>
                    </div>

                    <div id="appointment-list" class="overflow-auto" style="height: 550px;">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
